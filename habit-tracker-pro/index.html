<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Pro</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <header>

        <h1>📊 Habit Tracker Pro</h1>

        <button id="themeBtn">
            🌙 Dark Mode
        </button>

    </header>

    <!-- Add Habit -->

    <div class="add-habit">

        <input
            type="text"
            id="habitInput"
            placeholder="Enter New Habit..."
        >

        <button onclick="addHabit()">
            ➕ Add Habit
        </button>

    </div>

    <!-- Stats -->

    <div class="stats-grid">

        <div class="stat-card">
            <h2 id="totalHabits">0</h2>
            <p>Total Habits</p>
        </div>

        <div class="stat-card">
            <h2 id="completedHabits">0</h2>
            <p>Completed</p>
        </div>

        <div class="stat-card">
            <h2 id="progressPercent">0%</h2>
            <p>Progress</p>
        </div>

    </div>

    <!-- Progress Bar -->

    <div class="progress-section">

        <h2>🎯 Daily Progress</h2>

        <div class="progress-bar">

            <div id="progressFill"></div>

        </div>

    </div>

    <!-- Habit List -->

    <div class="habit-section">

        <h2>🔥 Your Habits</h2>

        <div id="habitList"></div>

    </div>

    <!-- Streak Summary -->

    <div class="summary-section">

        <h2>🏆 Streak Summary</h2>

        <p>
            Current Streak:
            <span id="currentStreak">0</span>
            Days
        </p>

    </div>

    <!-- Actions -->

    <div class="action-buttons">

        <button onclick="clearAllHabits()">
            🗑 Clear All
        </button>

        <button onclick="exportHabits()">
            📥 Export Data
        </button>

    </div>

</div>

<div id="toast"></div>

<script src="js/app.js"></script>

</body>
</html>
